<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0f766e" />
  <title>Quick Grocery Generator</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="app-header">
    <h1>Quick Grocery Generator</h1>
    <span id="saveStatus" class="save-status hidden">✓ Saved</span>
  </header>

  <main>
    <section id="planPanel" class="tab-panel">
      <div class="week-nav">
        <button id="prevWeekBtn" type="button" class="week-nav-btn" aria-label="Previous week">‹</button>
        <span id="weekRangeLabel" class="week-range"></span>
        <button id="nextWeekBtn" type="button" class="week-nav-btn" aria-label="Next week">›</button>
      </div>

      <button id="generateBtn" class="btn-primary" type="button">Generate Week</button>

      <p id="emptyState" class="empty-state">This week is empty. Tap "Generate Week" to fill it.</p>

      <section id="mealsSection" class="meals-section hidden">
        <p id="fixedBreakfastNote" class="fixed-breakfast-note"></p>
        <ol id="daysList" class="meals-list"></ol>
      </section>

      <section id="nutrientSection" class="nutrient-section hidden">
        <h2>Nutrient Coverage</h2>
        <p id="nutrientSummary" class="nutrient-summary"></p>
        <div id="nutrientChips" class="nutrient-chips"></div>
        <div id="nutrientSourceDetail" class="nutrient-source-detail hidden"></div>
      </section>
    </section>

    <section id="groceryPanel" class="tab-panel hidden">
      <p id="groceryWeekLabel" class="week-range"></p>
      <section id="groceryListSection" class="grocery-section hidden">
        <p class="fixed-note">Includes your daily breakfast (oats, peanut butter, banana, kefir).</p>
        <div id="groceryList"></div>
      </section>
      <p id="groceryEmptyState" class="empty-state">This week doesn't have a grocery list yet.</p>
    </section>

    <section id="savedPanel" class="tab-panel hidden">
      <p id="savedWeeksCount" class="week-range"></p>
      <ol id="weeksList" class="weeks-list"></ol>
      <p id="savedEmptyState" class="empty-state">No weeks saved yet. Generate one to get started.</p>
    </section>
  </main>

  <nav class="tab-bar" aria-label="Sections">
    <button type="button" class="tab-btn active" data-tab="planPanel">
      <span class="tab-icon" aria-hidden="true">📅</span>Plan
    </button>
    <button type="button" class="tab-btn" data-tab="groceryPanel">
      <span class="tab-icon" aria-hidden="true">🛒</span>Grocery List
    </button>
    <button type="button" class="tab-btn" data-tab="savedPanel">
      <span class="tab-icon" aria-hidden="true">🗂️</span>Saved Weeks
    </button>
  </nav>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
